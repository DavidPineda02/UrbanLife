<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrbanLife — Nueva Contraseña</title>
    <link rel="stylesheet" href="../css/pages/autenticacion.css">
    <script src="https://kit.fontawesome.com/3d24cd6467.js" crossorigin="anonymous"></script>
</head>

<body>
    <main class="autenticacion">

        <!-- Panel izquierdo -->
        <section class="autenticacion__imagen">
            <div class="autenticacion__overlay"></div>
            <div class="autenticacion__marca">
                <span class="autenticacion__marca-acento"></span>
                <h1 class="autenticacion__marca-titulo">UrbanLife</h1>
                <p class="autenticacion__marca-subtitulo">Mantén tu cuenta protegida con una contraseña segura.</p>
            </div>
        </section>

        <!-- Panel derecho -->
        <section class="autenticacion__contenido">
            <div class="formulario">
                <form class="formulario__form" id="form-nueva-contrasena" action="#">
                    <div class="formulario__encabezado">
                        <span class="formulario__encabezado-acento"></span>
                        <h2 class="formulario__titulo">Nueva contraseña</h2>
                        <p class="formulario__subtitulo">Crea una contraseña segura para proteger tu cuenta</p>
                    </div>
                    <div class="formulario__grupo">
                        <label for="password" class="formulario__etiqueta">Nueva Contraseña</label>
                        <div class="formulario__campo--password">
                            <input id="password" type="password" placeholder="••••••••"
                                class="formulario__campo" required>
                            <i class="formulario__icono fa-regular fa-eye-slash"></i>
                        </div>
                    </div>
                    <div class="formulario__grupo">
                        <label for="confirm-password" class="formulario__etiqueta">Confirmar Contraseña</label>
                        <div class="formulario__campo--password">
                            <input id="confirm-password" type="password" placeholder="••••••••"
                                class="formulario__campo" required>
                            <i class="formulario__icono fa-regular fa-eye-slash"></i>
                        </div>
                    </div>
                    <div class="formulario__botones">
                        <button type="submit" class="formulario__boton formulario__boton--principal">
                            Guardar Contraseña
                        </button>
                    </div>
                </form>
            </div>
            <p class="autenticacion__links">
                ¿Recordaste tu contraseña? <a class="autenticacion__enlace" href="../index.html" title="Iniciar sesión">Iniciar Sesión</a>
            </p>
        </section>

    </main>
    <script type="module" src="/js/pages/auth.js"></script>
</body>

</html>
